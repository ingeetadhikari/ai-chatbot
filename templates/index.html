<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">&#129302;</span>
          <span class="logo-text">AI Chatbot</span>
        </div>
      </div>
      <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
      <div class="sidebar-footer">
        <p>Powered by Claude</p>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-container">
      <header class="chat-header">
        <h1>Advanced AI Assistant</h1>
        <p class="subtitle">Friendly · Helpful · Intelligent</p>
      </header>

      <!-- Messages -->
      <div class="messages" id="messages">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">&#129302;</div>
          <h2>Hello! How can I help you today?</h2>
          <p>Ask me anything — I'm here to help with questions, explanations, ideas, and more.</p>
          <div class="suggestion-chips">
            <button class="chip" onclick="sendSuggestion('What is artificial intelligence?')">What is AI?</button>
            <button class="chip" onclick="sendSuggestion('Explain machine learning simply')">Machine Learning</button>
            <button class="chip" onclick="sendSuggestion('Give me a fun fact')">Fun Fact</button>
            <button class="chip" onclick="sendSuggestion('Help me brainstorm ideas')">Brainstorm</button>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="userInput"
            placeholder="Type your message..."
            rows="1"
            maxlength="4000"
          ></textarea>
          <button class="send-btn" id="sendBtn" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="input-hint">Press <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line</p>
      </div>
    </main>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
